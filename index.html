<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сюрприз</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: beige;
    font-family: Arial;
    overflow: hidden;
}

/* стартовый текст */
.start-text {
    position: absolute;
    top: 30%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: hotpink;
    transition: opacity 1.5s ease;
}

/* текст над сердцем */
.heart-text {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 22px;
    color: hotpink;
    opacity: 0;
    transition: opacity 1s ease;
}

/* сердце */
.heart {
    font-size: 120px;
    color: red;
    cursor: pointer;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: transform 0.2s ease, opacity 1s ease;
}

/* картинка */
.image {
    opacity: 0;
    max-width: 320px;
    border-radius: 20px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: opacity 2s ease;
}

/* сердечки */
.floating-heart {
    position: absolute;
    font-size: 20px;
    color: red;
    animation: floatUp 1.5s ease forwards;
    pointer-events: none;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-150px) scale(1.5); }
}
</style>
</head>

<body>

<div class="start-text" id="startText">
    Привет, Аля, надеюсь это тебе понравится😜
</div>

<div class="heart-text" id="heartText">
    Нажимай
</div>

<div class="heart" id="heart">❤️</div>

<img id="finalImage" class="image" src="изображение_2026-06-18_164653121.png">

<script>
const startText = document.getElementById("startText");
const heartText = document.getElementById("heartText");
const heart = document.getElementById("heart");
const image = document.getElementById("finalImage");

/* шаг 1 — текст → сердце появляется */
setTimeout(() => {
    startText.style.opacity = 0;
}, 3000);

setTimeout(() => {
    heart.style.opacity = 1;
}, 4500);

setTimeout(() => {
    heartText.style.opacity = 1;
}, 5000);

/* создание сердечек */
function createHeart(x, y) {
    const h = document.createElement("div");
    h.className = "floating-heart";
    h.innerText = "❤️";
    h.style.left = x + "px";
    h.style.top = y + "px";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 1500);
}

/* клик */
heart.addEventListener("click", () => {

    heart.style.transform = "translate(-50%, -50%) scale(1.2)";

    setTimeout(() => {
        heart.style.display = "none";
        heartText.style.display = "none";
    }, 300);

    for (let i = 0; i < 15; i++) {
        setTimeout(() => {
            createHeart(
                window.innerWidth / 2 + (Math.random() * 100 - 50),
                window.innerHeight / 2 + (Math.random() * 50 - 25)
            );
        }, i * 50);
    }

    setTimeout(() => {
        image.style.opacity = 1;
    }, 600);
});
</script>

</body>
</html>
