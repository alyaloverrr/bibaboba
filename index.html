<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сюрприз</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: beige;
    font-family: Arial;
    overflow: hidden;
}

/* стартовый текст */
.start-text {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: hotpink;
    transition: opacity 1.5s ease;
}

/* сердце по центру */
.heart {
    font-size: 120px;
    color: red;
    cursor: pointer;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* текст над сердцем */
.heart-text {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 22px;
    color: hotpink;
    opacity: 0;
    transition: opacity 1s ease;
}

/* контейнер сердца */
.heart-container {
    opacity: 0;
    transition: opacity 1s ease;
}

/* картинка */
.image {
    display: none;
    max-width: 320px;
    border-radius: 20px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<!-- 1. текст -->
<div class="start-text" id="startText">
    Привет, Аля, надеюсь тебе понравится
</div>

<!-- 2. текст над сердцем -->
<div class="heart-text" id="heartText">
    Нажимай
</div>

<!-- 3. сердце -->
<div class="heart" id="heart">❤️</div>

<!-- 4. картинка -->
<img id="finalImage" class="image" src="изображение_2026-06-18_164653121.png">

<script>
const startText = document.getElementById("startText");
const heartText = document.getElementById("heartText");
const heart = document.getElementById("heart");
const image = document.getElementById("finalImage");

/* шаг 1 — исчезает стартовый текст */
setTimeout(() => {
    startText.style.opacity = 0;
}, 3000);

/* шаг 2 — появляется текст над сердцем */
setTimeout(() => {
    heartText.style.opacity = 1;
}, 4500);

/* шаг 3 — клик по сердцу */
heart.addEventListener("click", () => {
    heart.style.display = "none";
    heartText.style.display = "none";

    setTimeout(() => {
        image.style.display = "block";
    }, 500);
});
</script>

</body>
</html>
