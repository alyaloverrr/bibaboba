<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сюрприз</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: beige;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* стартовый текст */
.start-text {
    position: absolute;
    font-size: 28px;
    color: hotpink;
    text-align: center;
    transition: opacity 1.5s ease;
}

/* блок с сердцем */
.heart-block {
    opacity: 0;
    text-align: center;
    transition: opacity 1.5s ease;
}

/* текст над сердцем */
.heart-text {
    font-size: 22px;
    color: hotpink;
    margin-bottom: 10px;
}

/* сердце */
.heart {
    font-size: 120px;
    cursor: pointer;
    color: red;
    transition: transform 0.3s ease;
}

.heart:active {
    transform: scale(1.2);
}

/* картинка */
.image {
    display: none;
    max-width: 320px;
    border-radius: 20px;
}
</style>
</head>

<body>

<!-- 1. текст -->
<div class="start-text" id="startText">
    Привет, Аля, надеюсь тебе это понравитсяяя😜
</div>

<!-- 2. сердце -->
<div class="heart-block" id="heartBlock">

    <div class="heart-text">Нажимай</div>
    <div class="heart" id="heart">❤️</div>

</div>

<!-- 3. картинка -->
<img id="finalImage" class="image">
    src="blob:https://web.telegram.org/f82cf9ed-4149-4eef-b177-7586a8d6c2be"

<script>
const startText = document.getElementById("startText");
const heartBlock = document.getElementById("heartBlock");
const heart = document.getElementById("heart");
const image = document.getElementById("finalImage");

/* шаг 1 — текст исчезает */
setTimeout(() => {
    startText.style.opacity = 0;
}, 3000);

/* шаг 2 — появляется сердце */
setTimeout(() => {
    heartBlock.style.opacity = 1;
}, 4500);

/* шаг 3 — клик */
heart.addEventListener("click", () => {
    heartBlock.style.opacity = 0;
    startText.style.opacity = 0;

    setTimeout(() => {
        image.style.display = "block";
    }, 800);
});
</script>

</body>
</html>
